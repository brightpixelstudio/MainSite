<div class="row" id="work-section">
  <div class="designs-container col-12">
    <div class="row pt-5 ps-4">
      <div class="col-1"></div>
      <div
        id="DesignsWebsite"
        class="col-3 barn"
        (click)="toggleWebsiteContent()"
        style="cursor: pointer"
      >
        <img [src]="currentImageWebsite" alt="" class="img-fluid" />
        <h1 [class]="isVisableWebsiteContent ? '' : 'disabled'">Websites</h1>
      </div>
      <div
        id="DesignsPrint"
        class="col-3 barn"
        (click)="togglePrintContent()"
        style="cursor: pointer"
      >
        <img [src]="currentImagePrint" alt="" class="img-fluid" />
        <h1 [class]="isVisablePrintContent ? '' : 'disabled'">Print</h1>
      </div>
      <div
        id="DesignsMobile"
        class="col-3 barn"
        (click)="toggleMobileContent()"
        style="cursor: pointer"
      >
        <img [src]="currentImageMobile" alt="" class="img-fluid" />
        <h1 [class]="isVisableMobileContent ? '' : 'disabled'">Mobile</h1>
      </div>
      <div class="col-1"></div>
    </div>
